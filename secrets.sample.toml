# Sample secrets for AQUASAFE
# Copy to secrets.toml and fill with real values; do not commit secrets.

[POSTGRES]
# Format: postgresql://user:password@host:port/database
uri = "postgresql://user:password@localhost:5432/locations"

[POPULATE_MONGO_IWMI]
# Format: mongodb://user:password@host:port/dbname
uri = "mongodb://user:password@localhost:27017/timeseries"

# Optional APIs (leave tokens blank or placeholders)
[CREATE_LOCATIONS_IWMI]
uri = "https://example.com/tslocations.api/topologies/importLocations"
token = "REPLACE_ME"

[CREATE_TIMESERIES_IWMI]
uri = "https://example.com/tslocations.api/series/importSeries/false"
token = "REPLACE_ME"

[POPULATE_TIMESERIES_IWMI]
uri = "https://example.com/tsvalues.api/writter/importValues"
token = "REPLACE_ME"
